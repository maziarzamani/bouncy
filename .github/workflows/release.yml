name: release

# Builds release tarballs / zips when a `v*` tag is pushed and
# uploads them to the GitHub Release. Once the matrix is green, a
# follow-up job publishes every workspace crate to crates.io in
# dependency order using the CRATES_IO_TOKEN repo secret.
#
# `workflow_dispatch` is supported for ad-hoc reruns. Note: tags
# pushed by the release-please bot use GITHUB_TOKEN, which by
# GitHub policy does NOT trigger downstream workflows. To get this
# to fire automatically on bot-pushed tags, configure
# release-please.yml to use a PAT instead of the default
# GITHUB_TOKEN. Without that, dispatch this workflow manually
# after a release-please merge: `gh workflow run release.yml --ref vX.Y.Z`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write           # for creating the release + uploading assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            archive: tar
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
            archive: tar
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
            archive: zip
        # aarch64-unknown-linux-gnu is intentionally excluded: rusty_v8
        # ships prebuilt static libs but cross-compiling them via
        # `cross` (Docker) needs careful libstdc++ pinning that's not
        # worth the maintenance for v0.1. Add when there's demand.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # NOTE: --locked dropped intentionally. release-please bumps
      # crate versions in Cargo.toml without touching Cargo.lock,
      # so on every release the lockfile is one revision behind. We
      # let cargo refresh it during the build — version drift is
      # negligible because we're only building from a fixed tag.
      - name: build
        run: cargo build --release --target ${{ matrix.target }} -p bouncy-cli -p bouncy-mcp

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-dev}"
          stem="bouncy-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${stem}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/bouncy.exe" "dist/${stem}/"
            cp "target/${{ matrix.target }}/release/bouncy-mcp.exe" "dist/${stem}/"
          else
            cp "target/${{ matrix.target }}/release/bouncy" "dist/${stem}/"
            cp "target/${{ matrix.target }}/release/bouncy-mcp" "dist/${stem}/"
          fi
          cp README.md LICENSE "dist/${stem}/" 2>/dev/null || true
          # CHANGELOG.md may not exist yet — best-effort copy.
          if [[ -f CHANGELOG.md ]]; then cp CHANGELOG.md "dist/${stem}/"; fi
          (
            cd dist
            if [[ "${{ matrix.archive }}" == "zip" ]]; then
              7z a -tzip "${stem}.zip" "${stem}"
            else
              tar czf "${stem}.tar.gz" "${stem}"
            fi
          )

      - name: upload artifact (CI inspection)
        uses: actions/upload-artifact@v4
        with:
          name: bouncy-${{ matrix.target }}
          path: dist/bouncy-*.${{ matrix.ext }}
          if-no-files-found: error

      - name: upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist/bouncy-*.${{ matrix.ext }}

  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Only publish on real tag pushes, not on workflow_dispatch
    # against `main` (which would have no version-bumped tag).
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crates
      - name: cargo login
        env:
          TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "::error::CRATES_IO_TOKEN secret is not set. See https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          cargo login "$TOKEN"
      # cargo publish has its own "wait for the registry index to
      # update" between dependent uploads, so we don't need explicit
      # sleeps. Order matters though: deps first, consumers last.
      - name: Publish bouncy-fetch
        run: cargo publish -p bouncy-fetch --no-verify
      - name: Publish bouncy-extract
        run: cargo publish -p bouncy-extract --no-verify
      - name: Publish bouncy-dom
        run: cargo publish -p bouncy-dom --no-verify
      - name: Publish bouncy-js
        run: cargo publish -p bouncy-js --no-verify
      - name: Publish bouncy-cdp
        run: cargo publish -p bouncy-cdp --no-verify
      - name: Publish bouncy-mcp
        run: cargo publish -p bouncy-mcp --no-verify
      - name: Publish bouncy-cli
        run: cargo publish -p bouncy-cli --no-verify
