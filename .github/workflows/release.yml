name: release

# Builds release tarballs / zips when a `v*` tag is pushed and
# uploads them to the GitHub Release. Once the matrix is green, a
# follow-up job publishes every workspace crate to crates.io in
# dependency order using the CRATES_IO_TOKEN repo secret.
#
# `workflow_dispatch` is supported for ad-hoc reruns. Be aware that
# dispatching against a tag reads THIS workflow file from that tag,
# so a workflow fix made after the tag won't apply on a re-dispatch.
# In that situation, force-move the tag to a commit that has the fix
# (admin bypass on the v* tag protection rule is required) and the
# subsequent push event will use the new file.
#
# Auto-trigger on tag push relies on release-please pushing tags via
# a PAT, NOT GITHUB_TOKEN — see release-please.yml header for setup.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write           # for creating the release + uploading assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            archive: tar
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
            archive: tar
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
            archive: zip
        # aarch64-unknown-linux-gnu is intentionally excluded: rusty_v8
        # ships prebuilt static libs but cross-compiling them via
        # `cross` (Docker) needs careful libstdc++ pinning that's not
        # worth the maintenance for v0.1. Add when there's demand.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # NOTE: --locked dropped intentionally. release-please bumps
      # crate versions in Cargo.toml without touching Cargo.lock,
      # so on every release the lockfile is one revision behind. We
      # let cargo refresh it during the build — version drift is
      # negligible because we're only building from a fixed tag.
      - name: build
        run: cargo build --release --target ${{ matrix.target }} -p bouncy-cli -p bouncy-mcp

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-dev}"
          stem="bouncy-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${stem}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/bouncy.exe" "dist/${stem}/"
            cp "target/${{ matrix.target }}/release/bouncy-mcp.exe" "dist/${stem}/"
          else
            cp "target/${{ matrix.target }}/release/bouncy" "dist/${stem}/"
            cp "target/${{ matrix.target }}/release/bouncy-mcp" "dist/${stem}/"
          fi
          cp README.md LICENSE "dist/${stem}/" 2>/dev/null || true
          # CHANGELOG.md may not exist yet — best-effort copy.
          if [[ -f CHANGELOG.md ]]; then cp CHANGELOG.md "dist/${stem}/"; fi
          (
            cd dist
            if [[ "${{ matrix.archive }}" == "zip" ]]; then
              7z a -tzip "${stem}.zip" "${stem}"
            else
              tar czf "${stem}.tar.gz" "${stem}"
            fi
          )

      - name: upload artifact (CI inspection)
        uses: actions/upload-artifact@v4
        with:
          name: bouncy-${{ matrix.target }}
          path: dist/bouncy-*.${{ matrix.ext }}
          if-no-files-found: error

      - name: upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist/bouncy-*.${{ matrix.ext }}

  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Only publish on real tag pushes, not on workflow_dispatch
    # against `main` (which would have no version-bumped tag).
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crates
      - name: cargo login
        env:
          TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "::error::CRATES_IO_TOKEN secret is not set. See https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          cargo login "$TOKEN"

      # Publish each crate in dep order (leaves first, cli last). Skip
      # any crate whose Cargo.toml version is already on crates.io —
      # release-please's `linked-versions` plugin only bumps crates
      # with bump-triggering commits in their path, so it's normal for
      # a release tag to leave some crates unchanged. Without this
      # guard, the first unchanged crate hits "already exists" and
      # nukes the whole job. cargo publish has its own "wait for the
      # registry index to update" between dependent uploads, so no
      # explicit sleeps are needed.
      - name: Publish crates
        run: |
          set -euo pipefail

          publish_if_new() {
            local crate="$1"
            local version
            version=$(cargo metadata --format-version 1 --no-deps \
              | jq -r ".packages[] | select(.name==\"${crate}\") | .version")
            if curl -sf "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
              echo ":: ${crate}@${version} already on crates.io, skipping"
            else
              echo ":: publishing ${crate}@${version}"
              cargo publish -p "${crate}" --no-verify
            fi
          }

          for crate in bouncy-fetch bouncy-extract bouncy-dom bouncy-js bouncy-cdp bouncy-mcp bouncy-cli; do
            publish_if_new "${crate}"
          done
