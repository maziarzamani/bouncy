name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  workspace:
    name: cargo build + test + clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      # Build before clippy so v8's build.rs has downloaded the rusty_v8
      # prebuilt static lib by the time clippy verifies link directives.
      - run: cargo build --workspace --all-targets
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      # Deliberately NOT passing --all-features to `cargo test`. Several
      # crates (bouncy-cli, bouncy-browse) have an `e2e` feature that
      # gates real-network tests against httpbin.org and example.com.
      # Enabling it in CI causes spurious failures whenever those
      # external services blip — we hit a 502 from httpbin in PR #29's
      # first run. E2E suite stays opt-in: run manually with
      # `cargo test --features e2e --test e2e` before cutting a release.
      - run: cargo test --workspace

