name: release-please

# Maintains an open "Release PR" on main: every push that introduces a
# `feat:` / `fix:` / etc commit (Conventional Commits) updates the PR's
# version bump and CHANGELOG entry. Merging the PR creates a `vX.Y.Z`
# tag, which fires `release.yml` to build + attach the tarballs.

on:
  push:
    branches:
      - main

permissions:
  contents: write          # tag / commit the version bump
  pull-requests: write     # open & update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Explicit target-branch — without this the action falls back
          # to the GitHub-configured default branch, which is currently
          # `claude/new-plan-JXUOu` and doesn't have our config files.
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
